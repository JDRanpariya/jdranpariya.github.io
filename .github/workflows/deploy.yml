name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  # Dependabot cannot regenerate bun.lock, so we do it for it on its branches
  # before the main check job runs. Commit is pushed back to the PR branch.
  refresh-lockfile:
    name: Refresh bun.lock (dependabot)
    if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@v2
      - name: Regenerate bun.lock
        run: |
          bun install --frozen-lockfile || true
          rm -f bun.lock
          bun install
      - name: Commit lockfile if changed
        run: |
          if [[ -n "$(git status --porcelain bun.lock)" ]]; then
            git config user.name 'dependabot[bot]'
            git config user.email '49699333+dependabot[bot]@users.noreply.github.com'
            git add bun.lock
            git commit --no-verify -m 'chore: regenerate bun.lock'
            git push
          else
            echo 'bun.lock already in sync'
          fi

  check:
    name: Build & verify
    runs-on: ubuntu-latest
    # Wait for lockfile regen on dependabot PRs; otherwise run immediately.
    needs: [refresh-lockfile]
    if: |
      always() &&
      (needs.refresh-lockfile.result == 'success' ||
       needs.refresh-lockfile.result == 'skipped')
    steps:
      - uses: actions/checkout@v6
        with:
          # Pick up the lockfile commit from refresh-lockfile when present.
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install Python dependencies
        run: pip install Pillow
      - name: Production build
        run: bun run build:prod
        env:
          WEBMENTION_API_KEY: ${{ secrets.WEBMENTION_API_KEY }}
      - name: Smoke test
        run: bun run check:smoke
      - name: Link check
        run: bun run check:links
      - name: Accessibility (pa11y + axe)
        run: bun run check:a11y
      - name: Lighthouse CI
        run: bun run check:lh
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
      - name: Upload build artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: "build"

  deploy:
    name: Deploy to GitHub Pages
    needs: check
    # check transitively depends on refresh-lockfile, which is skipped on
    # pushes (it only runs on dependabot PRs). Without always(), that skipped
    # ancestor makes the implicit success() check fail and deploy is skipped
    # on every push. Gate explicitly on check's result instead.
    if: |
      always() &&
      needs.check.result == 'success' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v6
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

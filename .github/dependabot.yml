version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      patch-updates:
        applies-to: version-updates
        update-types: ["patch"]
      minor-dev-deps:
        applies-to: version-updates
        dependency-type: "development"
        update-types: ["minor"]
    ignore:
      # major bumps for core frameworks — handle manually
      - dependency-name: "@11ty/eleventy"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "deps"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci"
